{% extends "base.html" %}
{% block content %}
<h2>Edit Password</h2>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <label>New Password:</label>
    <input type="password" name="password" value="{{ form.password.value }}">
    <button type="submit">Update</button>
</form>
{% endblock %}
