{% extends "base.html" %}
{% block content %}

<div class="card">
    <h2>Create Account</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Sign Up</button>
    </form>

    <br>
    <a href="{% url 'login' %}">Already have an account?</a>
</div>
{% endblock %}
